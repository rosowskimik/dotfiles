# ========================
# === Core             ===
# ========================
set -sa terminal-overrides ",*:RGB"
set -sa terminal-features "*:hyperlinks"
set -sa terminal-features "xterm*:extkeys"
set -g history-limit 20000
set -sg escape-time 0
set -g display-time 1500
set -g repeat-time 300
set -g focus-events on
set -g allow-passthrough on
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "#I:#T"
set -g extended-keys on
setw -g automatic-rename on
setw -g aggressive-resize on

set -g prefix C-Space
unbind C-b

# ========================
# === Key bindings     ===
# ========================

# Reload config
bind C-r source-file ${XDG_CONFIG_HOME}/tmux/tmux.conf \; display "Config reloaded"

# Window / split in cwd
bind c new-window -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind b split-window -v -c "#{pane_current_path}"

# Window switching
bind 1 select-window -t :1
bind 2 select-window -t :2
bind 3 select-window -t :3
bind 4 select-window -t :4
bind 5 select-window -t :5
bind 6 select-window -t :6
bind 7 select-window -t :7
bind 8 select-window -t :8
bind 9 select-window -t :9

# Pane switching
bind -r [ select-pane -t :.-
bind -r ] select-pane -t :.+
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

bind > swap-pane -D
bind < swap-pane -U

# Zoom
bind z resize-pane -Z

# Kill
bind x kill-pane
bind X kill-window
bind Q confirm-before -p "kill-session #S? (y/n)" kill-session

# Detach
bind d detach

# ========================
# === Copy mode        ===
# ========================
setw -g mode-keys vi
set -g @copy_use_osc52_fallback on

bind p paste-buffer
bind -n M-Up copy-mode

bind -T copy-mode-vi v     send-keys -X begin-selection
bind -T copy-mode-vi V     send-keys -X select-line
bind -T copy-mode-vi C-v   send-keys -X rectangle-toggle
bind -T copy-mode-vi y     send-keys -X copy-selection-and-cancel

bind -T copy-mode-vi M-Up       send-keys -X scroll-up
bind -T copy-mode-vi M-Down     send-keys -X scroll-down
bind -T copy-mode-vi M-PageUp   send-keys -X halfpage-up
bind -T copy-mode-vi M-PageDown send-keys -X halfpage-down

bind -T copy-mode-vi WheelUpPane   select-pane \; send-keys -X -N 2 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 2 scroll-down

# ========================
# === Theme            ===
# ========================
color_orange="colour166"
color_purple="colour134"
color_green="colour076"
color_blue="colour39"
color_yellow="colour220"
color_red="colour160"
color_black="colour232"
color_white="white"

color_dark="$color_black"
color_light="$color_white"
color_session_text="$color_blue"
color_status_text="colour245"
color_main="$color_orange"
color_secondary="$color_purple"
color_window_off_indicator="colour088"
color_window_off_status_bg="colour238"
color_window_off_status_current_bg="colour254"

set -g mode-style "fg=default,bg=$color_main"
set -g message-style "fg=$color_main,bg=$color_dark"
set -g status-style "fg=$color_status_text,bg=$color_dark"

set -g window-status-separator ""
separator_powerline_right=""

setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=$color_light,bold,bg=$color_main"
setw -g window-status-current-format "#[fg=$color_dark,bg=$color_main]$separator_powerline_right#[default] #I:#W #[fg=$color_main,bg=$color_dark]$separator_powerline_right#[default]"
setw -g pane-active-border-style "fg=$color_main"

set -g status on
set -g status-interval 20
set -g status-position top
set -g status-justify left
set -g status-right-length 100

wg_session="#[fg=$color_session_text] #S #[default]"
wg_date="#[fg=$color_secondary]%d %h %H:%M#[default]"
wg_is_zoomed="#[fg=$color_dark,bg=$color_secondary]#{?window_zoomed_flag,[Z],}#[default]"

set -g status-left "$wg_session"
set -g status-right "#{prefix_highlight} $wg_is_zoomed $wg_date "

set -g @prefix_highlight_output_prefix '['
set -g @prefix_highlight_output_suffix ']'
set -g @prefix_highlight_fg "$color_dark"
set -g @prefix_highlight_bg "$color_secondary"
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr "fg=$color_dark,bg=$color_secondary"

# ========================
# === Environment      ===
# ========================
set -g update-environment \
  "DISPLAY\
  WAYLAND_DISPLAY\
  SSH_ASKPASS\
  SSH_AUTH_SOCK\
  SSH_AGENT_PID\
  SSH_CONNECTION\
  SSH_TTY\
  WINDOWID\
  XAUTHORITY"
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# ========================
# === Plugins          ===
# ========================
set-environment -g TMUX_PLUGIN_MANAGER_PATH "${XDG_DATA_HOME}/tmux/plugins"
if "test ! -d ${XDG_DATA_HOME}/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ${XDG_DATA_HOME}/tmux/plugins/tpm && ${XDG_DATA_HOME}/tmux/plugins/tpm/bin/install_plugins'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'mrjones2014/smart-splits.nvim'

set -g @tmux-nvim-resize false

bind -T root F12  \
    set prefix None \;\
    set key-table off \;\
    set status-style "fg=$color_status_text,bg=$color_window_off_status_bg" \;\
    set window-status-current-format "#[fg=$color_window_off_status_bg,bg=$color_window_off_status_current_bg]$separator_powerline_right#[default] #I:#W# #[fg=$color_window_off_status_current_bg,bg=$color_window_off_status_bg]$separator_powerline_right#[default]" \;\
    set window-status-current-style "fg=$color_dark,bold,bg=$color_window_off_status_current_bg" \;\
    if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
    refresh-client -S \;\

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  set -u window-status-current-style \;\
  set -u window-status-current-format \;\
  refresh-client -S

run "${XDG_DATA_HOME}/tmux/plugins/tpm/tpm"
