[debian]
image="docker.io/library/debian:stable"
init=true
entry=false

additional_packages="bat ccache curl debianutils direnv eza fd-find fzf git htop lazygit openssh-client pigz pixz procps"
additional_packages="ripgrep shellcheck starship wl-clipboard zip zsh zsh-autosuggestions zsh-syntax-highlighting"
additional_packages="systemd libpam-systemd"

init_hooks=[ -f /root/.debian_run ] || wcurl https://github.com/neovim/neovim/releases/download/v0.12.2/nvim-linux-x86_64.appimage;
init_hooks=[ -f /root/.debian_run ] || chmod +x nvim-linux-x86_64.appimage;
init_hooks=[ -f /root/.debian_run ] || ./nvim-linux-x86_64.appimage --appimage-extract;
init_hooks=[ -f /root/.debian_run ] || cp -a squashfs-root/* /;
init_hooks=[ -f /root/.debian_run ] || rm -fr squashfs-root nvim-linux-x86_64.appimage;

init_hooks=[ -f /root/.debian_run ] || install -Dt /distrobox-shell.d/ /run/host/$(pwd)/shell/00-debian.zsh;

init_hooks=[ -f /root/.debian_run ] || touch /root/.debian_run;

[buildroot]
include=debian

additional_packages="bc binutils bsdextrautils bzip2 cpio diffutils file findutils g++ gcc gzip make patch"
additional_packages="perl python3 rsync sed tar unzip wget xz-utils"
additional_packages="libncurses5-dev"

init_hooks=[ -f /root/.br_run ] || install -Dt /distrobox-shell.d/ /run/host/$(pwd)/shell/10-buildroot.zsh;

init_hooks=[ -f /root/.br_run ] || touch /root/.br_run;

[yocto]
include=debian

additional_packages="build-essential chrpath cpio debianutils diffstat file gawk gcc git iputils-ping"
additional_packages="libacl1 liblz4-tool locales python3 python3-git python3-jinja2 python3-pexpect"
additional_packages="python3-pip python3-subunit socat texinfo unzip wget xz-utils zstd"
additional_packages="bmaptool"

init_hooks=[ -f /root/.yocto_run ] || wcurl https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo;
init_hooks=[ -f /root/.yocto_run ] || chmod +x /usr/local/bin/repo;

init_hooks=[ -f /root/.yocto_run ] || touch /root/.yotcto_run;
